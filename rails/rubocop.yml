inherit_from:
  - ../ruby/rubocop.yml
  - ../ruby/rubocop_rspec.yml

plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-rake
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-rspec_rails

require:
  - sgcop

# 自動生成されるものなどはチェック対象から除外する
AllCops:
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - "bin/*"
    - "config/backup.rb"
    - "config/boot.rb"
    - "config/unicorn.rb"
    - "config/spring.rb"
    - "config/puma.rb"
    - "config.ru"
    - "db/*schema.rb"
    - "deploy/*"
    - "spec/rails_helper.rb"
    - "spec/spec_helper.rb"

Rails:
  Enabled: true

# ARオブジェクトのuniqを取りたいわけでなく、特定の属性のuniqが取りたい場合でも警告が出るので
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railsuniqbeforepluck
Rails/UniqBeforePluck:
  Enabled: false

# デフォルトにstagingが含まれていない
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railsunknownenv
Rails/UnknownEnv:
  Environments:
    - production
    - development
    - test
    - staging

# ブラウザの標準仕様でnoopenner扱いとなった
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railslinktoblank
Rails/LinkToBlank:
  Enabled: false

# マイグレーションでchange or downメソッドが定義されているか確認
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railsreversiblemigrationmethoddefinition
Rails/ReversibleMigrationMethodDefinition:
  Enabled: true

# default_scopeはデフォルト禁止
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railsdefaultscope
Rails/DefaultScope:
  Enabled: true

# ============================================================
# Metrics
# ============================================================
# routes, rspec, migrationにおけるブロックの長さについては致し方ない
# https://docs.rubocop.org/rubocop/latest/cops_metrics.html#metricsblocklength
Metrics/BlockLength:
  AllowedMethods:
    - refine
    - included
    - namespace
    - configure
  Exclude:
    - "config/routes.rb"
    - "spec/**/*"
    - "db/migrate/*"
    - "db/seeds/**/*"
  # 要素を縦に並べるのは可読性のためなので実行数が増えても許容する
  CountAsOne: ["array", "hash", "method_call"]

# https://docs.rubocop.org/rubocop/latest/cops_metrics.html#metricsmethodlength
Metrics/MethodLength:
  # migratonは致し方ない
  Exclude:
    - "db/migrate/*"
    - "db/seeds/**/*"
  # 要素を縦に並べるのは可読性のためなので実行数が増えても許容する
  CountAsOne: ["array", "hash", "method_call"]

# https://docs.rubocop.org/rubocop/latest/cops_metrics.html#metricsclasslength
Metrics/ClassLength:
  # 要素を縦に並べるのは可読性のためなので実行数が増えても許容する
  CountAsOne: ["array", "hash", "method_call"]

# https://docs.rubocop.org/rubocop/latest/cops_metrics.html#metricsmodulelength
Metrics/ModuleLength:
  # 要素を縦に並べるのは可読性のためなので実行数が増えても許容する
  CountAsOne: ["array", "hash", "method_call"]

# migratonは致し方ない
# https://docs.rubocop.org/rubocop/latest/cops_metrics.html#metricsabcsize
Metrics/AbcSize:
  Exclude:
    - "db/migrate/*"
    - "db/seeds/**/*"

# ============================================================
# Style
# ============================================================

Style:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"

# NOTE: 上の department 単位 Exclude は、利用側が個別 Cop（例 Style/StringLiterals）に
# Exclude を持つと RuboCop の仕様（rubocop#9983, not planned）で打ち消される。
# そのため bin/rails app:update が生成・上書きする定型ファイルで実際に発火する代表 Cop については、
# 個別 Cop 単位でも Exclude を併記し、利用側 .rubocop_todo.yml の Exclude と
# inherit_mode: merge で合流させる（department が打ち消されても効くようにする）。
# https://github.com/rubocop/rubocop/issues/9983
# https://docs.rubocop.org/rubocop/latest/cops_style.html#stylestringliterals
Style/StringLiterals:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_style.html#styledocumentation
Style/Documentation:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_style.html#styleglobalstdstream
Style/GlobalStdStream:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_style.html#stylesymbolarray
Style/SymbolArray:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_style.html#styletrailingcommainhashliteral
Style/TrailingCommaInHashLiteral:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_style.html#stylepercentliteraldelimiters
Style/PercentLiteralDelimiters:
  Exclude:
    - "config/application.rb"
    - "config/ci.rb"
    - "config/initializers/*"
    - "config/environments/*"

# def show;endって書き方読みやすいとは思わない
# https://docs.rubocop.org/rubocop/latest/cops_style.html#styleemptymethod
Style/EmptyMethod:
  Enabled: false

# Railsのパッチバージョンを誤判定するので
# https://docs.rubocop.org/rubocop/latest/cops_style.html#styleipaddresses
Style/IpAddresses:
  Exclude:
    - "Gemfile"

Layout:
  Exclude:
    - "config/initializers/*"
    - "config/environments/*"

# NOTE: Style と同じく、利用側の個別 Cop Exclude で上の department Exclude が打ち消される
# （rubocop#9983）ため、app:update 管理下の定型ファイルで発火する代表 Cop を個別に併記する。
# https://docs.rubocop.org/rubocop/latest/cops_layout.html#layoutspaceinsidearrayliteralbrackets
Layout/SpaceInsideArrayLiteralBrackets:
  Exclude:
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_layout.html#layoutcommentindentation
Layout/CommentIndentation:
  Exclude:
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_layout.html#layoutemptylineaftermagiccomment
Layout/EmptyLineAfterMagicComment:
  Exclude:
    - "config/initializers/*"
    - "config/environments/*"
# https://docs.rubocop.org/rubocop/latest/cops_layout.html#layoutmultilineassignmentlayout
Layout/MultilineAssignmentLayout:
  Exclude:
    - "config/initializers/*"
    - "config/environments/*"

# メールプレビュー画面をわかりやすくする為に日本語メソッド名を許可
# https://docs.rubocop.org/rubocop/latest/cops_naming.html#namingasciiidentifiers
Naming/AsciiIdentifiers:
  Exclude:
    - "spec/mailers/previews/*.rb"
# https://docs.rubocop.org/rubocop/latest/cops_naming.html#namingmethodname
Naming/MethodName:
  Exclude:
    - "spec/mailers/previews/*.rb"


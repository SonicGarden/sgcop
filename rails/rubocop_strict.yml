# sgcop 厳格版（strict）設定 — Rails プロジェクト向け
#
# 通常版 (rails/rubocop.yml) に加え、純 Ruby 系の strict 設定 (ruby/rubocop_strict.yml) と
# RSpec 系の strict 設定 (ruby/rubocop_rspec_strict.yml) を取り込んだうえで、
# Rails 系のおすすめ汎用 Cop を有効化する。
#
# inherit_from は後勝ち。rails 通常版（Rails 系の標準設定）→ ruby strict（純 Ruby 系の推奨 Cop）
# → rspec strict（RSpec 系の推奨 Cop）の順に取り込む。ruby strict を後に置くことで、rails 通常版が
# 引き継ぐ ruby/rubocop.yml の明示無効化（例 Style MethodCallWithArgsParentheses を false にしている設定）が、
# strict の有効化を打ち消さないようにしている。
# （ruby/rubocop_strict.yml は ruby/rubocop.yml しか継承しないため、Rails 系の標準設定は上書きしない）
# Rails プロジェクトは `inherit_gem: sgcop: rails/rubocop_strict.yml` で一括適用できる。
inherit_from:
  - rubocop.yml
  - ../ruby/rubocop_strict.yml
  - ../ruby/rubocop_rspec_strict.yml

# SQL ヒアドキュメントは squish して整形する
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railssquishedsqlheredocs
Rails/SquishedSQLHeredocs:
  Enabled: true

# 範囲指定の where は where(col: a..b) 形式に統一する
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railswhererange
Rails/WhereRange:
  Enabled: true

# FactoryBot は build / create などを直接呼ぶ記法に統一する
# https://docs.rubocop.org/rubocop-factory_bot/latest/cops_factorybot.html#factorybotsyntaxmethods
FactoryBot/SyntaxMethods:
  Enabled: true

# マイグレーションのカラム・テーブル定義にコメントを必須にする
# https://docs.rubocop.org/rubocop-rails/latest/cops_rails.html#railsschemacomment
Rails/SchemaComment:
  Enabled: true

# ============================================================
# sgcop カスタム Cop（デフォルト無効 → strict で有効化）
# ============================================================

# ネストされたルーティングでは module オプションを使用することを推奨
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/nested_resources_without_module.rb
Sgcop/NestedResourcesWithoutModule:
  Enabled: true

# accepts_nested_attributes_for の使用を制限
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/no_accepts_nested_attributes_for.rb
Sgcop/NoAcceptsNestedAttributesFor:
  Enabled: true

# エラーメッセージはシンボルを使用することを強制
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/error_message_format.rb
Sgcop/ErrorMessageFormat:
  Enabled: true

# N+1 問題を防ぐ strict_loading の使用を推奨
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/strict_loading_required.rb
Sgcop/StrictLoadingRequired:
  Enabled: true

# fill_in の第 1 引数をラベルまたは name 属性のどちらかに統一
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/capybara/fill_in_argument.rb
Sgcop/Capybara/FillInArgument:
  Enabled: true

# 脆弱な CSS セレクタの使用を防止（data 属性の使用を推奨）
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/capybara/fragile_selector.rb
Sgcop/Capybara/FragileSelector:
  Enabled: true

# ループ内で1件ずつperform_laterを呼ばずperform_all_laterでまとめてenqueue
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/no_looped_perform_later.rb
Sgcop/NoLoopedPerformLater:
  Enabled: true

# ============================================================
# sgcop カスタム Cop（特定 gem 依存 — 使用する場合はコメントを外す）
# ============================================================

# enumerize gem を使用している場合は以下のコメントを外す

# Enumerize の default オプションの使用をチェック
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/enumerize_default_option.rb
# Sgcop/EnumerizeDefaultOption:
#   Enabled: true

# Enumerize の predicates オプションの使用を制限
# https://github.com/SonicGarden/sgcop/blob/main/lib/rubocop/cop/sgcop/enumerize_predicates_option.rb
# Sgcop/EnumerizePredicatesOption:
#   Enabled: true
